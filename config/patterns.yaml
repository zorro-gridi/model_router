patterns:
  explore:
    label: "探索与调研"
    default_flow: ["plan", "design"]
    default_complexity: "simple"
    primary_model: "MiniMax-M3"
    keywords:
      - ["explore", 3]
      - ["调研", 3]
      - ["了解一下", 2]
      - ["搞清楚", 2]
      - ["read code", 2]
      - ["understand", 2]
      - ["trace", 2]
      - ["investigate", 2]
      - ["看看", 1]
      - ["分析现状", 2]
      - ["梳理", 1]

  architecture:
    label: "架构设计"
    default_flow: ["explore", "plan", "design", "audit"]
    default_complexity: "complex"
    primary_model: "MiniMax-M3"
    keywords:
      - ["架构", 3]
      - ["architecture", 3]
      - ["系统设计", 3]
      - ["顶层设计", 3]
      - ["整体方案", 2]
      - ["技术选型", 2]
      - ["模块划分", 3]

  feature:
    label: "新功能需求"
    default_flow: ["plan", "design", "implement", "test", "audit"]
    default_complexity: "medium"
    primary_model: "MiniMax-M3"
    keywords:
      - ["新增功能", 3]
      - ["添加功能", 3]
      - ["加个功能", 2]
      - ["新增字段", 2]
      - ["新功能", 2]
      - ["做一个", 1]
      - ["实现一个", 1]
      - ["new feature", 3]
      - ["add feature", 3]
      - ["implement feature", 3]
      - ["support ", 1]
      - ["支持 ", 1]
      - ["加", 1]

  implement:
    label: "功能实现"
    default_flow: ["plan", "design", "implement", "test"]
    default_complexity: "medium"
    primary_model: "MiniMax-M3"
    keywords:
      - ["实现", 3]
      - ["实施", 3]
      - ["写代码", 2]
      - ["开发", 3]
      - ["develop", 3]
      - ["build", 2]
      - ["create", 2]
      - ["coding", 2]
      - ["代码实现", 3]
      - ["implement", 1]

  debug:
    label: "调试异常"
    default_flow: ["explore", "implement", "test"]
    default_complexity: "medium"
    primary_model: "MiniMax-M3"
    keywords:
      - ["bug", 3]
      - ["fix", 3]
      - ["修复", 3]
      - ["defect", 3]
      - ["崩溃", 3]
      - ["crash", 3]
      - ["异常", 2]
      - ["报错", 2]
      - ["error", 2]
      - ["故障", 3]
      - ["debug", 3]
      - ["修", 1]

  refactor:
    label: "模块重构"
    default_flow: ["explore", "design", "implement", "test", "audit"]
    default_complexity: "medium"
    primary_model: "MiniMax-M3"
    keywords:
      - ["refactor", 3]
      - ["重构", 3]
      - ["整理", 2]
      - ["优化结构", 3]
      - ["restructure", 3]
      - ["reorganize", 2]
      - ["改结构", 3]
